<svg width="181" height="181" viewBox="38 28 181 181" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="sc">
      <rect x="119" y="82" width="18" height="112" rx="2"/>
    </clipPath>

    <!-- Top face: light hits upper-right corner, darker toward lower-left -->
    <linearGradient id="grad-top" x1="174" y1="45" x2="82" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f5b832"/>
      <stop offset="55%"  stop-color="#e8a020"/>
      <stop offset="100%" stop-color="#c97e10"/>
    </linearGradient>

    <!-- Bot-right wall: brightest at top-right, fades down -->
    <linearGradient id="grad-br" x1="199" y1="113" x2="153" y2="194" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#dfa030"/>
      <stop offset="100%" stop-color="#a86818"/>
    </linearGradient>

    <!-- Bot-left wall: darker face, slight vertical fade -->
    <linearGradient id="grad-bl" x1="153" y1="168" x2="82" y2="181" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8c5a10"/>
      <stop offset="100%" stop-color="#673e08"/>
    </linearGradient>

    <!-- Left wall: darkest face, subtle top-to-bottom -->
    <linearGradient id="grad-left" x1="57" y1="88" x2="82" y2="181" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6a4210"/>
      <stop offset="100%" stop-color="#422806"/>
    </linearGradient>

    <!-- Hole ring: radial to give depth -->
    <radialGradient id="grad-hole" cx="122" cy="95" r="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5a3e08"/>
      <stop offset="100%" stop-color="#2a1a00"/>
    </radialGradient>

  </defs>

  <rect width="256" height="256" fill="#1a1a1a" style="stroke:none;opacity:0;dominant-baseline:auto"/>

  <!-- Top face -->
  <polygon points="103,32 174,45 199,113 153,168 82,155 57,88" fill="url(#grad-top)" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Bot-right wall -->
  <polygon points="199,113 153,168 153,194 199,139" fill="url(#grad-br)" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Bot-left wall -->
  <polygon points="153,168 82,155 82,181 153,194" fill="url(#grad-bl)" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Left wall (thin) -->
  <polygon points="82,155 57,88 57,114 82,181" fill="url(#grad-left)" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Center hole -->
  <ellipse cx="128" cy="100" rx="28" ry="28" fill="url(#grad-hole)" stroke="#111" stroke-width="2"/>
  <ellipse cx="128" cy="100" rx="22" ry="22" fill="#111"/>

  <!-- BOLT — unchanged -->
  <g transform="rotate(11 128 108)">

    <polygon points="128,36 151,49 151,69 128,82 105,69 105,49" fill="#f5d020" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>
    <line x1="118" y1="59" x2="138" y2="59" stroke="#111" stroke-width="3" stroke-linecap="round"/>

    <rect x="119" y="82" width="18" height="112" rx="2" fill="#f5d020"/>

    <line x1="119" y1="82"  x2="119" y2="95"  stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>
    <line x1="119" y1="95"  x2="119" y2="108" stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>
    <line x1="119" y1="108" x2="119" y2="121" stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>
    <line x1="119" y1="121" x2="119" y2="134" stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>
    <line x1="119" y1="134" x2="119" y2="147" stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>
    <line x1="119" y1="147" x2="119" y2="160" stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>
    <line x1="119" y1="160" x2="119" y2="173" stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>
    <line x1="119" y1="173" x2="119" y2="186" stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>
    <line x1="119" y1="186" x2="119" y2="194" stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>

    <line x1="137" y1="82"  x2="137" y2="95"  stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>
    <line x1="137" y1="95"  x2="137" y2="108" stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>
    <line x1="137" y1="108" x2="137" y2="121" stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>
    <line x1="137" y1="121" x2="137" y2="134" stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>
    <line x1="137" y1="134" x2="137" y2="147" stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>
    <line x1="137" y1="147" x2="137" y2="160" stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>
    <line x1="137" y1="160" x2="137" y2="173" stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>
    <line x1="137" y1="173" x2="137" y2="186" stroke="#111" stroke-width="5.5" stroke-linecap="butt"/>
    <line x1="137" y1="186" x2="137" y2="194" stroke="#111" stroke-width="1.8" stroke-linecap="butt"/>

    <line x1="119" y1="82"  x2="137" y2="82"  stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="119" y1="194" x2="137" y2="194" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>

    <g clip-path="url(#sc)" stroke="#111" stroke-width="2" stroke-linecap="round">
      <line x1="117" y1="91"  x2="139" y2="83"/>
      <line x1="117" y1="104" x2="139" y2="96"/>
      <line x1="117" y1="117" x2="139" y2="109"/>
      <line x1="117" y1="130" x2="139" y2="122"/>
      <line x1="117" y1="143" x2="139" y2="135"/>
      <line x1="117" y1="156" x2="139" y2="148"/>
      <line x1="117" y1="169" x2="139" y2="161"/>
      <line x1="117" y1="182" x2="139" y2="174"/>
    </g>

    <polygon points="119,194 128,206 137,194" fill="#f5d020" stroke="#111" stroke-width="3.5" stroke-linejoin="round"/>

  </g>

</svg>
